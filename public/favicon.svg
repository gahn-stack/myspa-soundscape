<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle with MySpa blue -->
  <circle cx="32" cy="32" r="30" fill="#1c2b6e"/>
  <!-- Sound wave bars representing relaxation sounds -->
  <rect x="16" y="24" width="4" height="16" rx="2" fill="#bae1e8" opacity="0.6">
    <animate attributeName="height" values="16;20;16" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="24;22;24" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="23" y="20" width="4" height="24" rx="2" fill="#bae1e8" opacity="0.8">
    <animate attributeName="height" values="24;28;24" dur="2.3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="20;18;20" dur="2.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="30" y="17" width="4" height="30" rx="2" fill="#bae1e8">
    <animate attributeName="height" values="30;34;30" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="17;15;17" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="37" y="20" width="4" height="24" rx="2" fill="#bae1e8" opacity="0.8">
    <animate attributeName="height" values="24;28;24" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="y" values="20;18;20" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="44" y="24" width="4" height="16" rx="2" fill="#bae1e8" opacity="0.6">
    <animate attributeName="height" values="16;20;16" dur="2.1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="24;22;24" dur="2.1s" repeatCount="indefinite"/>
  </rect>
</svg>
